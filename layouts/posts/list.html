{{ define "main" }}
<div class="list-page list-grid">
  <div class="section-header">
    <h1 class="section-title">데일리 브리핑</h1>
  </div>

  <div class="briefing-grid">
    {{ range .Paginator.Pages }}
    <a href="{{ .Permalink }}" class="briefing-card">
      {{ with .Params.cover }}
      <div class="briefing-thumb">
        <img src="{{ . | relURL }}" alt="" loading="lazy">
      </div>
      {{ end }}
      <time class="briefing-date">{{ .Date.Format "2006-01-02" }}</time>
      <h3 class="briefing-title">{{ .Title }}</h3>
    </a>
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
