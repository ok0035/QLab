<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 945" width="1800" height="945">
  <defs>
    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
      text { font-family: 'Pretendard', sans-serif; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="1800" height="945" fill="#FFFFFF"/>

  <!-- 가격 -->
  <text x="900" y="340" text-anchor="middle"
        font-size="160" font-weight="700" fill="#1E1F21">
    $65,978
  </text>

  <!-- 변동률 -->
  <text x="900" y="500" text-anchor="middle"
        font-size="80" font-weight="700" fill="#EF4444">
    ▼  -0.5%
  </text>

  <!-- 구분선 -->
  <line x1="80" y1="590" x2="1720" y2="590"
        stroke="#E6E6E9" stroke-width="2"/>

  <!-- 세로 구분선 -->
  <line x1="900" y1="630" x2="900" y2="885"
        stroke="#E6E6E9" stroke-width="2"/>

  <!-- 포지션 -->
  <text x="450" y="780" text-anchor="middle"
        font-size="72" font-weight="700" fill="#6B7280">
    포지션 — 없음
  </text>

  <!-- 공포지수 -->
  <text x="1350" y="780" text-anchor="middle"
        font-size="72" font-weight="700" fill="#1E1F21">
    공포지수 — 14
  </text>
</svg>